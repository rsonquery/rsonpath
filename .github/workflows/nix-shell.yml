name: "Nix Shell Build"
on:
  pull_request:
    branches: ["main", "nix"]
  push:
    branches: ["main", "nix"]

permissions:
  contents: read

jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            crates.io:443
            index.crates.io:443
            static.crates.io:443
            static.rust-lang.org:443
            nixos.org:443
            cache.nixos.org:443
            channels.nixos.org:443
            releases.nixos.org:443
            tarballs.nixos.org:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: rrbutani/use-nix-shell-action@59a52b2b9bbfe3cc0e7deb8f9059abe37a439edf # v1.1.0
        with:
          file: shell.nix
      - name: Add Nightly
        run: rustup toolchain install nightly-x86_64-unknown-linux-gnu
      - name: Add Rustup
        run: rustup component add rustfmt --toolchain nightly-x86_64-unknown-linux-gnu
      - name: Build
        run: just build
